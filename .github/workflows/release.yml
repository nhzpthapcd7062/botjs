name: release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-macos-arm64:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build + test
        run: npm test

      - name: Prepare native asset
        run: |
          cp build/Release/crobot.node crobot-darwin-arm64.node

      - name: Upload native asset
        uses: actions/upload-artifact@v4
        with:
          name: native-darwin-arm64
          path: crobot-darwin-arm64.node

  build-windows-x64:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node (x64)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          architecture: x64

      - name: Install dependencies
        run: npm install

      - name: Build + test
        run: npm test

      - name: Prepare native asset
        shell: bash
        run: |
          cp build/Release/crobot.node crobot-win32-x64.node

      - name: Upload native asset
        uses: actions/upload-artifact@v4
        with:
          name: native-win32-x64
          path: crobot-win32-x64.node

  github-release:
    runs-on: macos-14
    needs: [build-macos-arm64, build-windows-x64]

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Pack
        run: npm pack

      - name: Download native assets
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List artifacts
        run: ls -R ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tgz
            artifacts/native-darwin-arm64/crobot-darwin-arm64.node
            artifacts/native-win32-x64/crobot-win32-x64.node
          generate_release_notes: true
